<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Galería completa | K-lab Costa Rica</title>

    <link rel="stylesheet" href="styles.css" />
</head>

<body class="full-gallery-body">
    <main class="full-gallery-page">
        <section class="gallery section">
            <div class="container">

                <div class="section-header">
                    <span class="section-label">GALERÍA</span>
                    <h1>Galería completa</h1>
                    <p>
                        Explora las fotos de actividades, cursos, talleres y experiencias de K-lab Costa Rica.
                    </p>
                </div>

                    <div id="fullGalleryGrid" class="full-gallery-grid">
                        <p class="gallery-empty">Cargando galería...</p>
                    </div>

                    <div class="gallery-actions">
                        <button id="loadMoreFullGallery" class="btn btn-secondary gallery-full-btn" type="button">
                            Cargar más fotos
                        </button>
                    </div>

                    <div class="gallery-actions">
                        <a href="index.html" class="btn btn-secondary gallery-full-btn">
                            ← Regresar a la página principal
                        </a>
                    </div>

            </div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/ui/full-gallery.js"></script>

</html>
