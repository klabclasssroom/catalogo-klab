<section class="section catalogo" id="catalogo">
      <div class="container">
        <div class="section-head split reveal">
          <div>
            <span class="section-kicker">Oferta académica</span>
            <h2>Catálogo de cursos</h2>
            <p>Filtrá por área y encontrá el curso ideal para vos.</p>
          </div>
          <div class="filters-wrap">
            <label for="categoryFilter" class="filter-label">Filtrar por categoría</label>
            <div class="filters" id="filterButtons"></div>
          </div>
        </div>

        <div class="catalog-layout">
          <aside class="catalog-sidebar reveal">
            <div class="sidebar-card">
              <span class="section-kicker">Resumen</span>
              <h3>Distribución de cursos</h3>
              <ul id="categorySummary" class="summary-list"></ul>
            </div>
          </aside>
          <div class="catalog-main">
            <div class="catalog-toolbar reveal">
              <p id="catalogStatus">Mostrando todos los cursos</p>
            </div>
            <div class="course-grid" id="courseGrid"></div>
          </div>
        </div>
      </div>
    </section>
